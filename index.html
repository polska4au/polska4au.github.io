<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P4AU Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-image"></div>

    <nav class="navbar">
        <div class="logo">PERSONA 4 ARENA ULTIMAX</div>
        <div class="nav-links">
            <a href="#">STORY</a>
            <a href="#">BATTLE</a>
            <a href="#">NETWORK</a>
            <a href="#">PRACTICE</a>
        </div>
    </nav>

    <main class="menu-wrapper">
        <button id="discordToggle" class="menu-button">
            Open Discord Invite
        </button>

        <div id="discordMenu" class="discord-menu hidden">
            <iframe
                src="https://discordapp.com/widget?id=1405910565523689473&theme=dark"
                width="350"
                height="250"
                allowtransparency="true"
                frameborder="0">
            </iframe>
        </div>
    </main>

    <script>
        const button = document.getElementById("discordToggle");
        const menu = document.getElementById("discordMenu");

        button.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    </script>
</body>
</html>
